<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FPS Guess</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>FPS Guess</h1>
          <p>左右の動きを見比べて、どちらがなめらかかを当てる</p>
        </div>
        <div class="scoreboard" aria-label="スコア">
          <span><b id="score">0</b> 正解</span>
          <span><b id="round">1</b> / <b id="totalRounds">10</b></span>
        </div>
      </header>

      <section class="controls" aria-label="ゲーム設定">
        <div class="control-group">
          <span class="label">候補</span>
          <div class="segmented" role="group" aria-label="候補の難しさ">
            <button class="segment active" data-mode="easy" type="button">基本</button>
            <button class="segment" data-mode="normal" type="button">標準</button>
            <button class="segment" data-mode="hard" type="button">細かい</button>
          </div>
        </div>
        <label class="control-select">
          下限
          <input id="minFpsInput" type="number" min="1" max="1000" step="1" value="10" aria-label="最小フレームレート" />
          <span class="unit">fps</span>
        </label>
        <label class="control-select">
          上限
          <input id="maxFpsInput" type="number" min="1" max="1000" step="1" value="60" aria-label="最大フレームレート" />
          <span class="unit">fps</span>
        </label>
        <button id="restartButton" class="icon-button" type="button" title="最初から">
          <span aria-hidden="true">↻</span>
        </button>
      </section>

      <section class="stage" aria-label="比較エリア">
        <article class="lane" aria-label="左の映像">
          <div class="lane-head">
            <span>左</span>
            <strong id="leftReveal">?</strong>
          </div>
          <canvas id="leftCanvas" width="480" height="280"></canvas>
        </article>
        <article class="lane" aria-label="右の映像">
          <div class="lane-head">
            <span>右</span>
            <strong id="rightReveal">?</strong>
          </div>
          <canvas id="rightCanvas" width="480" height="280"></canvas>
        </article>
      </section>

      <section class="answers" aria-label="回答">
        <span class="answer-label">なめらかな方</span>
        <div class="choice-row" role="group" aria-label="なめらかな方を選ぶ">
          <button class="choice active" data-choice="left" type="button">左</button>
          <button class="choice" data-choice="right" type="button">右</button>
          <button class="choice" data-choice="same" type="button">同じ</button>
        </div>
        <button id="answerButton" class="primary" type="button">回答する</button>
        <button id="nextButton" class="secondary" type="button" disabled>次へ</button>
      </section>

      <p id="feedback" class="feedback" aria-live="polite"></p>
    </main>

    <div id="resultModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="resultTitle" hidden>
      <div class="modal-panel">
        <h2 id="resultTitle">結果</h2>
        <p id="resultScore" class="result-score"></p>
        <p id="resultDetail" class="result-detail"></p>
        <button id="modalRestartButton" class="primary" type="button">もう一度</button>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
